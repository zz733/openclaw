<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dream Diary Preview</title>
    <style>
      :root {
        --bg: #0a0d14;
        --panel: #12151e;
        --border: #1e2230;
        --text: #c8cdd8;
        --text-strong: #e8ecf4;
        --muted: #6b7280;
        --accent: #ff4d4d;
        --accent-muted: #b34747;
        --accent-subtle: rgba(255, 77, 77, 0.06);
        --accent-2: #fbbf24;
        --ok: #22c55e;
        --ok-muted: #4ade80;
        --danger: #ef4444;
        --mono: "SF Mono", "Fira Code", "JetBrains Mono", monospace;
        --radius-full: 9999px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        overflow-x: hidden;
      }

      .btn {
        cursor: pointer;
        border: none;
        font-family: inherit;
        font-size: 12px;
        border-radius: 8px;
        padding: 6px 12px;
        transition: all 140ms ease;
      }
      .btn--subtle {
        background: color-mix(in oklab, var(--panel) 80%, transparent);
        color: var(--text);
        border: 1px solid var(--border);
      }
      .btn--subtle:hover {
        border-color: color-mix(in oklab, var(--accent) 40%, var(--border));
      }
      .btn--sm {
        font-size: 11px;
        padding: 4px 10px;
      }

      /* ═══ Hero animation ═══ */
      .dreams-page {
        display: flex;
        flex-direction: column;
      }

      .dreams {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
        user-select: none;
      }

      .dreams__lobster {
        animation: dreams-breathe 4s ease-in-out infinite;
        filter: drop-shadow(0 0 40px rgba(255, 77, 77, 0.25));
      }
      .dreams__lobster svg {
        width: 160px;
        height: 160px;
      }

      @keyframes dreams-breathe {
        0%,
        100% {
          transform: scale(1) translateY(0);
        }
        50% {
          transform: scale(1.04) translateY(-4px);
        }
      }

      .dreams__z {
        position: absolute;
        font-family: var(--mono);
        font-weight: 700;
        color: var(--accent);
        opacity: 0;
        animation: dreams-float-z 4s ease-out infinite;
      }
      .dreams__z:nth-child(14) {
        font-size: 14px;
        right: calc(50% - 100px);
        top: calc(50% - 80px);
        animation-delay: 0s;
      }
      .dreams__z:nth-child(15) {
        font-size: 20px;
        right: calc(50% - 130px);
        top: calc(50% - 120px);
        animation-delay: 1.2s;
      }
      .dreams__z:nth-child(16) {
        font-size: 28px;
        right: calc(50% - 160px);
        top: calc(50% - 170px);
        animation-delay: 2.4s;
      }

      @keyframes dreams-float-z {
        0% {
          opacity: 0;
          transform: translateY(10px) rotate(-5deg);
        }
        15% {
          opacity: 0.7;
        }
        80% {
          opacity: 0.3;
        }
        100% {
          opacity: 0;
          transform: translateY(-40px) rotate(10deg);
        }
      }

      .dreams__star {
        position: absolute;
        border-radius: 50%;
        animation: dreams-twinkle 3s ease-in-out infinite alternate;
      }
      @keyframes dreams-twinkle {
        0% {
          opacity: 0.15;
          transform: scale(0.8);
        }
        100% {
          opacity: 0.7;
          transform: scale(1.2);
        }
      }

      .dreams__moon {
        position: absolute;
        top: 40px;
        right: 80px;
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #fef3c7, #fbbf24);
        box-shadow:
          0 0 40px rgba(251, 191, 36, 0.2),
          0 0 80px rgba(251, 191, 36, 0.08);
        opacity: 0.7;
        animation: dreams-moon-glow 8s ease-in-out infinite alternate;
      }
      @keyframes dreams-moon-glow {
        0% {
          box-shadow:
            0 0 40px rgba(251, 191, 36, 0.2),
            0 0 80px rgba(251, 191, 36, 0.08);
          opacity: 0.6;
        }
        100% {
          box-shadow:
            0 0 50px rgba(251, 191, 36, 0.3),
            0 0 100px rgba(251, 191, 36, 0.12);
          opacity: 0.8;
        }
      }

      .dreams__glow {
        position: absolute;
        top: calc(50% + 40px);
        left: 50%;
        transform: translateX(-50%);
        width: 240px;
        height: 100px;
        border-radius: 50%;
        background: radial-gradient(ellipse, rgba(255, 77, 77, 0.08) 0%, transparent 70%);
        pointer-events: none;
        animation: dreams-glow-pulse 4s ease-in-out infinite;
      }
      @keyframes dreams-glow-pulse {
        0%,
        100% {
          opacity: 0.6;
        }
        50% {
          opacity: 1;
        }
      }

      .dreams__bubble {
        position: absolute;
        top: calc(50% - 200px);
        left: calc(50% - 200px);
        padding: 16px 20px;
        background: var(--accent-subtle);
        border: 1px solid rgba(255, 92, 92, 0.12);
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        animation: dreams-bubble-float 6s ease-in-out infinite;
        pointer-events: none;
      }
      .dreams__bubble-text {
        font-size: 16px;
        color: var(--accent);
        font-style: italic;
        opacity: 0.8;
        min-width: 180px;
        text-align: center;
      }
      .dreams__bubble-dot {
        position: absolute;
        border-radius: 50%;
        background: var(--accent-subtle);
        border: 1px solid rgba(255, 92, 92, 0.1);
        animation: dreams-bubble-float 6s ease-in-out infinite;
      }
      @keyframes dreams-bubble-float {
        0%,
        100% {
          transform: translateY(0);
          opacity: 0.8;
        }
        50% {
          transform: translateY(-8px);
          opacity: 1;
        }
      }

      .dreams__status {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        margin-top: 32px;
      }
      .dreams__status-label {
        font-size: 13px;
        color: var(--muted);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        font-weight: 500;
      }
      .dreams__status-detail {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--ok-muted);
      }
      .dreams__status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--ok);
        animation: dreams-dot-pulse 2s ease-in-out infinite;
      }
      @keyframes dreams-dot-pulse {
        0%,
        100% {
          opacity: 1;
          box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4);
        }
        50% {
          opacity: 0.7;
          box-shadow: 0 0 8px 2px rgba(34, 197, 94, 0.2);
        }
      }

      .dreams__stats {
        display: flex;
        align-items: center;
        gap: 48px;
        margin-top: 36px;
        z-index: 1;
      }
      .dreams__stat {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }
      .dreams__stat-value {
        font-size: 28px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }
      .dreams__stat-label {
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .dreams__stat-divider {
        width: 1px;
        height: 32px;
        background: var(--border);
      }

      /* ═══ Compact phase bar ═══ */
      .dreams__phase-bar {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 24px;
        padding: 12px 24px;
        background: linear-gradient(
          0deg,
          color-mix(in oklab, var(--bg) 80%, transparent),
          transparent
        );
        z-index: 1;
      }
      .dreams__phase-bar-phases {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .dreams__phase-pip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .dreams__phase-pip-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--muted);
        opacity: 0.4;
      }
      .dreams__phase-pip--on .dreams__phase-pip-dot {
        background: var(--ok);
        opacity: 1;
        box-shadow: 0 0 6px rgba(34, 197, 94, 0.3);
      }
      .dreams__phase-pip--on {
        color: var(--text);
      }
      .dreams__phase-pip-time {
        font-size: 10px;
        color: var(--muted);
        opacity: 0.7;
      }
      .dreams__phase-bar-actions {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      /* ═══ Dream Diary ═══ */
      .dreams-diary {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 48px 24px 64px;
        min-height: 320px;
        background: linear-gradient(
          180deg,
          var(--bg) 0%,
          color-mix(in oklab, var(--bg) 94%, #0d0818) 40%,
          color-mix(in oklab, var(--bg) 88%, #0d0818) 100%
        );
      }
      .dreams-diary::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          transparent 30%,
          rgba(251, 191, 36, 0.012) 45%,
          rgba(255, 77, 77, 0.015) 55%,
          transparent 70%
        );
        background-size: 400% 400%;
        animation: diary-shimmer 20s ease-in-out infinite;
        pointer-events: none;
      }
      @keyframes diary-shimmer {
        0%,
        100% {
          background-position: 0% 0%;
        }
        50% {
          background-position: 100% 100%;
        }
      }

      .dreams-diary__header {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 32px;
        width: 100%;
        max-width: 520px;
        position: relative;
        z-index: 1;
      }
      .dreams-diary__title {
        font-size: 10px;
        font-weight: 500;
        color: var(--muted);
        letter-spacing: 0.14em;
        text-transform: uppercase;
        opacity: 0.7;
        flex: 1;
      }
      .dreams-diary__nav {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .dreams-diary__page {
        font-size: 11px;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        min-width: 36px;
        text-align: center;
        opacity: 0.6;
      }

      .dreams-diary__nav-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        height: 22px;
        border-radius: 6px;
        border: 1px solid color-mix(in oklab, var(--border) 60%, transparent);
        background: transparent;
        color: var(--muted);
        font-size: 14px;
        line-height: 1;
        cursor: pointer;
        transition:
          color 140ms ease,
          border-color 140ms ease;
        padding: 0;
      }
      .dreams-diary__nav-btn:hover:not(:disabled) {
        color: var(--text);
        border-color: color-mix(in oklab, var(--accent) 30%, var(--border));
      }
      .dreams-diary__nav-btn:disabled {
        opacity: 0.2;
        cursor: default;
      }

      .dreams-diary__entry {
        position: relative;
        max-width: 520px;
        width: 100%;
        padding: 0 0 0 20px;
        z-index: 1;
        animation: diary-entry-reveal 1.4s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      @keyframes diary-entry-reveal {
        0% {
          opacity: 0;
          transform: translateY(16px);
          filter: blur(8px);
        }
        50% {
          filter: blur(2px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
          filter: blur(0);
        }
      }

      .dreams-diary__accent {
        position: absolute;
        top: 4px;
        left: 0;
        width: 2px;
        height: calc(100% - 8px);
        border-radius: 2px;
        background: linear-gradient(
          180deg,
          color-mix(in oklab, var(--accent) 40%, transparent) 0%,
          color-mix(in oklab, var(--accent) 8%, transparent) 100%
        );
        animation: diary-glow-pulse 6s ease-in-out infinite alternate;
      }
      @keyframes diary-glow-pulse {
        0% {
          opacity: 0.25;
        }
        100% {
          opacity: 0.65;
        }
      }

      .dreams-diary__date {
        display: block;
        font-size: 10px;
        color: var(--accent-muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 400;
        margin-bottom: 16px;
        opacity: 0.8;
      }

      .dreams-diary__para {
        margin: 0 0 12px;
        font-size: 14px;
        line-height: 1.8;
        color: color-mix(in oklab, var(--text) 85%, var(--muted));
        font-style: italic;
        animation: diary-text-stream 2.4s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .dreams-diary__para:last-child {
        margin-bottom: 0;
      }

      @keyframes diary-text-stream {
        0% {
          opacity: 0;
          mask-image: linear-gradient(90deg, black 0%, transparent 0%);
          -webkit-mask-image: linear-gradient(90deg, black 0%, transparent 0%);
        }
        30% {
          opacity: 1;
        }
        100% {
          opacity: 1;
          mask-image: linear-gradient(90deg, black 100%, transparent 100%);
          -webkit-mask-image: linear-gradient(90deg, black 100%, transparent 100%);
        }
      }
    </style>
  </head>

    <script>
      const entries = [
        {
          date: "April 5, 2026, 3:00 AM",

      let currentPage = 0;

      function renderEntry(page) {
        const entry = entries[page];
        const el = document.getElementById("diary-entry");
        el.innerHTML = "";
        el.style.animation = "none";
        el.offsetHeight;
        el.style.animation = "";

        const accent = document.createElement("div");
        accent.className = "dreams-diary__accent";
        el.appendChild(accent);

        const dateEl = document.createElement("time");
        dateEl.className = "dreams-diary__date";
        dateEl.textContent = entry.date;
        el.appendChild(dateEl);

        const prose = document.createElement("div");
        prose.className = "dreams-diary__prose";

        entry.paragraphs.forEach((text, i) => {
          const p = document.createElement("p");
          p.className = "dreams-diary__para";
          p.style.animationDelay = 0.3 + i * 0.15 + "s";
          p.textContent = text;
          prose.appendChild(p);
        });

        el.appendChild(prose);

        document.getElementById("page-info").textContent = `${page + 1} / ${entries.length}`;
        document.getElementById("btn-newer").disabled = page === 0;
        document.getElementById("btn-older").disabled = page === entries.length - 1;
      }

      function goOlder() {
        if (currentPage < entries.length - 1) {
          currentPage++;
          renderEntry(currentPage);
        }
      }
      function goNewer() {
        if (currentPage > 0) {
          currentPage--;
          renderEntry(currentPage);
        }
      }

      renderEntry(0);
    </script>
